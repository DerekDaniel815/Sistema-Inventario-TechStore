<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar / Editar Categoría - TechStore</title>
    <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="../../assets/img/logo-techstore.png" alt="Logotipo de TechStore" />
            <h1>Tech<span>Store USECA</span></h1>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="../../index.html">Inicio</a></li>
                <li><a href="../producto/producto.html">Productos</a></li>
                <li><a href="categoria.html" class="active">Categorías</a></li>
                <li><a href="../reportes/reportes.html">Reportes</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <nav class="breadcrumb" aria-label="Ruta de navegación">
            <a href="../../index.html">Inicio</a>
            <span class="sep">/</span>
            <a href="categoria.html">Categorías</a>
            <span class="sep">/</span>
            <span>Nueva / Editar</span>
        </nav>

        <div class="page-header">
            <div>
                <h2>Nueva / Editar Categoría</h2>
                <p>Define el nombre y la descripción de la categoría.</p>
            </div>
            <div class="page-actions">
                <a href="categoria.html" class="btn-secondary">← Volver</a>
            </div>
        </div>

        <section class="form-card">
            <h3>Datos de la categoría</h3>
            <form action="#" method="post">
                <div class="form-grid">
                    <div class="form-group full">
                        <label for="nombre_cat">Nombre CAT <span class="required">*</span></label>
                        <input type="text" id="nombre_cat" name="nombre_cat" placeholder="Ej: Periféricos" required />
                    </div>

                    <div class="form-group full">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" name="descripcion" placeholder="Breve descripción de la categoría..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <select id="estado" name="estado">
                            <option value="1">Activa</option>
                            <option value="0">Inactiva</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="orden">Orden de aparición</label>
                        <input type="number" id="orden" name="orden" min="0" placeholder="0" />
                    </div>
                </div>

                <div class="form-actions">
                    <a href="categoria.html" class="btn-secondary">Cancelar</a>
                    <button type="reset" class="btn-secondary">Limpiar</button>
                    <button type="submit" class="btn">Guardar categoría</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 <strong>TechStore</strong> — Taller de Programación Web</p>
    </footer>

    <script src="../../js/storage.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/seed.js"></script>
    <script src="../../js/categorias-data.js"></script>
    <script src="../../js/productos-data.js"></script>
    <script src="../../js/movimientos-data.js"></script>
    <script src="../../js/stats.js"></script>
    <script src="../../js/init.js"></script>
    <script src="../../js/format-utils.js"></script>
    <script src="../../js/ui-utils.js"></script>
    <script src="../../js/categoria-producto.js"></script>
    <script src="../../js/categoria-form.js"></script>
</body>
</html>
