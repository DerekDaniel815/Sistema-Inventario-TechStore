 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos - TechStore</title>
    <link rel="stylesheet" href="../../styles/main.css">
</head>
<body>
    <header class="main-header">
        <h1>TechStore - Productos</h1>
        <nav>
            <ul>
                <li><a href="../../index.html">Inicio</a></li>
                <li><a href="producto.html" class="active">Productos</a></li>
                <li><a href="../categoria/categoria.html">Categorías</a></li>

                    <tr>
